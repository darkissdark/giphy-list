name: Postdeploy Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Deployed URL for smoke tests'
        required: false
        type: string

concurrency:
  group: postdeploy-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TARGET_URL: ${{ inputs.target_url || vars.PROD_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure target URL is provided
        run: |
          if [ -z "${TARGET_URL}" ]; then
            echo "TARGET_URL is empty. Set workflow input 'target_url' or repository variable PROD_BASE_URL."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npm run test:pw:install

      - name: Run remote E2E smoke
        run: npm run test:pw -- --grep-invert @api --project=chromium-desktop

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-postdeploy
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
